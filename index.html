<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CrickAnt Live Stats PRO</title>

<style>
body{
    margin:0;
    background:transparent;
    font-family:Arial,Helvetica,sans-serif;
}

/* MAIN BAR */
.livebar{
    display:inline-flex;
    align-items:center;
    gap:18px;

    padding:10px 16px;
    border-radius:14px;

    background:rgba(15, 23, 42, 0.75);
    backdrop-filter: blur(10px);

    color:#fff;

    font-size:20px;
    font-weight:700;

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 6px 20px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.1);
}

/* LIVE DOT */
.live{
    color:#ff3b30;
    animation:pulse 1.2s infinite;
    text-shadow:0 0 10px rgba(255,0,0,0.6);
}

@keyframes pulse{
    0%{opacity:1; transform:scale(1);}
    50%{opacity:0.4; transform:scale(1.05);}
    100%{opacity:1; transform:scale(1);}
}

/* ITEMS */
.item{
    white-space:nowrap;
}

.value{
    margin-left:6px;
    transition: all 0.3s ease;
}

/* COLORS */
.subs{ color:#4ade80; }
.likes{ color:#fbbf24; }
.viewers{ color:#60a5fa; }
</style>
</head>

<body>

<div class="livebar">

<span class="live">🔴 LIVE</span>

<span class="item subs">👥 <span id="subs">...</span></span>

<span class="item likes">👍 <span id="likes">...</span></span>

<span class="item viewers">👁️ <span id="viewers">...</span></span>

</div>

<script>

const API_KEY = "AIzaSyCemhZq445bjWz5WcvAm2TW7SJH--ZcKeM";
const CHANNEL_ID = "UCl2YvPVvilace6dpoaYWZYA";

/* FORMAT */
function formatNumber(num){
    return Number(num).toLocaleString();
}

/* SMOOTH COUNT ANIMATION */
function animateValue(id, newValue){
    const el = document.getElementById(id);

    let start = Number(el.innerText.replace(/,/g,'')) || 0;
    let end = Number(newValue);

    let duration = 600;
    let startTime = null;

    function animate(time){
        if(!startTime) startTime = time;
        let progress = Math.min((time - startTime) / duration, 1);

        let value = Math.floor(start + (end - start) * progress);
        el.innerText = value.toLocaleString();

        if(progress < 1){
            requestAnimationFrame(animate);
        }
    }

    requestAnimationFrame(animate);
}

/* LIVE VIDEO */
async function getLiveVideoId(){
    try{
        const res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
        );

        const data = await res.json();

        return data.items?.[0]?.id?.videoId || null;

    }catch(e){
        return null;
    }
}

/* MAIN */
async function updateStats(){

    try{

        const channelRes = await fetch(
        `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`
        );

        const channelData = await channelRes.json();

        if(channelData.items?.length){

            animateValue(
                "subs",
                channelData.items[0].statistics.subscriberCount
            );
        }

        const liveVideoId = await getLiveVideoId();

        if(!liveVideoId){
            document.getElementById("likes").innerText = "OFFLINE";
            document.getElementById("viewers").innerText = "OFFLINE";
            return;
        }

        const videoRes = await fetch(
        `https://www.googleapis.com/youtube/v3/videos?part=statistics,liveStreamingDetails&id=${liveVideoId}&key=${API_KEY}`
        );

        const videoData = await videoRes.json();

        if(!videoData.items?.length) return;

        const v = videoData.items[0];

        animateValue("likes", v.statistics.likeCount || 0);
        animateValue("viewers", v.liveStreamingDetails?.concurrentViewers || 0);

    }
    catch(err){
        console.log(err);
    }
}

updateStats();
setInterval(updateStats, 12000);

</script>

</body>
</html>
