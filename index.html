<!DOCTYPE html><html>  <head>  
<meta charset="UTF-8">  
<title>CrickAnt Live Stats</title><style>  
body{  
    margin:0;  
    background:transparent;  
    font-family:Arial,Helvetica,sans-serif;  
}  .livebar{
display:inline-flex;
align-items:center;
gap:20px;

background:rgba(0,0,0,.82);  

color:#fff;  

padding:10px 18px;  

border-radius:14px;  

font-size:22px;  

font-weight:700;  

backdrop-filter:blur(4px);  

box-shadow:0 4px 12px rgba(0,0,0,.35);

}

.live{
color:#ff3b30;
animation:pulse 1.5s infinite;
}

.item{
white-space:nowrap;
}

.value{
margin-left:4px;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:.45;}
100%{opacity:1;}
}
</style></head><body><div class="livebar"><span class="live">🔴 LIVE</span>

<span class="item">  
👥 <span class="value" id="subs">...</span> Subs  
</span><span class="item">  
👍 <span class="value" id="likes">...</span> Likes  
</span><span class="item">  
👁️ <span class="value" id="viewers">...</span> Watching  
</span></div><script>  const API_KEY = "AIzaSyCASHq2b4-TrgfrPodhlLsr1Hkk9QmZDQo";
const CHANNEL_ID = "UCl2YvPVvilace6dpoaYWZYA";

function formatNumber(num){

num = Number(num);  

if(num >= 1000000){  
    return (num/1000000).toFixed(1).replace(".0","")+"M";  
}  

if(num >= 1000){  
    return (num/1000).toFixed(1).replace(".0","")+"K";  
}  

return num.toLocaleString();

}

async function getLiveVideoId(){

const res = await fetch(  
    `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`  
);  

const data = await res.json();  

if(data.items && data.items.length > 0){  
    return data.items[0].id.videoId;  
}  

return null;

}

async function updateStats(){

try{  

    const channelRes = await fetch(  
        `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`  
    );  

    const channelData = await channelRes.json();  

    document.getElementById("subs").innerText =  
        formatNumber(channelData.items[0].statistics.subscriberCount);  

    const liveVideoId = await getLiveVideoId();  

    if(!liveVideoId){  

        document.getElementById("likes").innerText = "OFFLINE";  
        document.getElementById("viewers").innerText = "OFFLINE";  

        return;  
    }  

    const videoRes = await fetch(  
        `https://www.googleapis.com/youtube/v3/videos?part=statistics,liveStreamingDetails&id=${liveVideoId}&key=${API_KEY}`  
    );  

    const videoData = await videoRes.json();  

    document.getElementById("likes").innerText =  
        formatNumber(videoData.items[0].statistics.likeCount || 0);  

    document.getElementById("viewers").innerText =  
        formatNumber(videoData.items[0].liveStreamingDetails.concurrentViewers || 0);  

}  
catch(err){  
    console.log(err);  
}

}

updateStats();
setInterval(updateStats,15000);

</script></body>

</html>
