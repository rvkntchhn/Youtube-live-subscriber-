<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrickAnt Live Stats</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:transparent;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}

.livebar{

display:inline-flex;
align-items:center;
gap:18px;

padding:10px 18px;

border-radius:14px;

background:linear-gradient(90deg,#111827,#1f2937,#111827);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 0 18px rgba(0,0,0,.45),
0 0 10px rgba(59,130,246,.15);

backdrop-filter:blur(8px);

color:#fff;

font-size:20px;
font-weight:700;

animation:barGlow 3s infinite alternate;

}

@keyframes barGlow{

from{
box-shadow:
0 0 18px rgba(0,0,0,.45),
0 0 10px rgba(59,130,246,.15);
}

to{
box-shadow:
0 0 24px rgba(0,0,0,.65),
0 0 18px rgba(16,185,129,.25);
}

}

.live{

color:#ff3b30;

font-weight:bold;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{opacity:1;}

50%{opacity:.35;}

100%{opacity:1;}

}

.item{

display:flex;

align-items:center;

gap:6px;

white-space:nowrap;

}

.subs{

color:#22c55e;

text-shadow:0 0 8px rgba(34,197,94,.45);

}

.likes{

color:#facc15;

text-shadow:0 0 8px rgba(250,204,21,.45);

}

.viewers{

color:#38bdf8;

text-shadow:0 0 8px rgba(56,189,248,.45);

}

.value{

display:inline-block;

min-width:70px;

text-align:left;

transition:.35s;

}

.pop{

animation:pop .35s;

}

@keyframes pop{

0%{transform:scale(1);}

50%{transform:scale(1.18);}

100%{transform:scale(1);}

}

.status{

font-size:12px;

opacity:.75;

margin-left:8px;

}

</style>

</head>

<body>

<div class="livebar">

<span class="live">🔴 LIVE</span>

<div class="item subs">
👥
<span id="subs" class="value">...</span>
</div>

<div class="item likes">
👍
<span id="likes" class="value">...</span>
</div>

<div class="item viewers">
👁️
<span id="viewers" class="value">...</span>
</div>

<span id="status" class="status"></span>

</div>

<script>

/* ===========================
   CONFIG
=========================== */

const TEST_MODE = false;

/*
true  = Offline Test
false = Real API
*/

const API_KEY="AIzaSyDzUy6wk9FMaXQpuMNQ8p_mzK1_-rmi5gI";

const CHANNEL_ID="UCl2YvPVvilace6dpoaYWZYA";

/* ========================= */

function formatNumber(n){

return Number(n||0).toLocaleString();

}

function animate(id,value){

const el=document.getElementById(id);

if(el.innerText!=value){

el.classList.add("pop");

setTimeout(()=>{

el.classList.remove("pop");

},350);

}

el.innerText=value;

}/* ===========================
   TEST MODE
=========================== */

if(TEST_MODE){

    let s=12540;
    let l=325;
    let v=89;

    animate("subs",formatNumber(s));
    animate("likes",formatNumber(l));
    animate("viewers",formatNumber(v));

    document.getElementById("status").innerText="TEST MODE";

    setInterval(()=>{

        s+=Math.floor(Math.random()*3);

        l+=Math.floor(Math.random()*2);

        v=80+Math.floor(Math.random()*25);

        animate("subs",formatNumber(s));
        animate("likes",formatNumber(l));
        animate("viewers",formatNumber(v));

    },3000);

}

/* ===========================
   LIVE MODE
=========================== */

else{

async function getLiveVideoId(){

    try{

        const res=await fetch(

`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`

        );

        const data=await res.json();

        if(data.items && data.items.length>0){

            return data.items[0].id.videoId;

        }

        return null;

    }

    catch(e){

        return null;

    }

}

async function updateStats(){

try{

document.getElementById("status").innerText="Updating...";

const channelRes=await fetch(

`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`

);

const channelData=await channelRes.json();

if(channelData.items && channelData.items.length){

animate(

"subs",

formatNumber(channelData.items[0].statistics.subscriberCount)

);

}

const liveVideoId=await getLiveVideoId();

if(!liveVideoId){

animate("likes","OFFLINE");

animate("viewers","OFFLINE");

document.getElementById("status").innerText="No Live";

return;

}

const videoRes=await fetch(

`https://www.googleapis.com/youtube/v3/videos?part=statistics,liveStreamingDetails&id=${liveVideoId}&key=${API_KEY}`

);

const videoData=await videoRes.json();

if(videoData.items && videoData.items.length){

const v=videoData.items[0];

animate(

"likes",

formatNumber(v.statistics.likeCount||0)

);

animate(

"viewers",

formatNumber(

v.liveStreamingDetails.concurrentViewers||0

)

);

document.getElementById("status").innerText="LIVE";

}

}

catch(err){

console.log(err);

document.getElementById("status").innerText="API ERROR";

}

}

updateStats();

setInterval(updateStats,15000);

}

</script>

</body>

</html>
