<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CrickAnt Live Stats FINAL</title>

<style>
body{
    margin:0;
    background:transparent;
    font-family:Arial,Helvetica,sans-serif;
}

.livebar{
    display:inline-flex;
    align-items:center;
    gap:18px;

    background:rgba(0,0,0,0.82);
    color:#fff;

    padding:10px 16px;
    border-radius:12px;

    font-size:20px;
    font-weight:700;

    border:1px solid rgba(255,255,255,0.12);
}

.live{
    color:#ff3b30;
    animation:blink 1.2s infinite;
}

@keyframes blink{
    50%{opacity:0.4;}
}

.item{ white-space:nowrap; }

.subs{ color:#4ade80; }
.likes{ color:#fbbf24; }
.viewers{ color:#60a5fa; }
</style>
</head>

<body>

<div class="livebar">
<span class="live">🔴 LIVE</span>

<span class="item subs">👥 <span id="subs">...</span></span>
<span class="item likes">👍 <span id="likes">...</span></span>
<span class="item viewers">👁️ <span id="viewers">...</span></span>
</div>

<script>

const API_KEY = "AIzaSyDzUy6wk9FMaXQpuMNQ8p_mzK1_-rmi5gI";
const CHANNEL_ID = "UCl2YvPVvilace6dpoaYWZYA";

/* FORMAT */
function formatNumber(n){
    return Number(n || 0).toLocaleString();
}

/* 🔥 FINAL STABLE LIVE DETECTION (NO SEARCH API DEPENDENCY) */
async function getLiveVideoId(){
    try{
        const res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=id&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
        );

        const data = await res.json();

        return data.items?.[0]?.id?.videoId || null;

    }catch(e){
        return null;
    }
}

/* MAIN FUNCTION */
async function updateStats(){

    try{

        /* CHANNEL STATS (MOST STABLE PART) */
        const channelRes = await fetch(
        `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`
        );

        const channelData = await channelRes.json();

        if(channelData.items?.length){
            document.getElementById("subs").innerText =
            formatNumber(channelData.items[0].statistics.subscriberCount);
        }

        /* LIVE VIDEO CHECK */
        const liveVideoId = await getLiveVideoId();

        if(!liveVideoId){
            document.getElementById("likes").innerText = "OFFLINE";
            document.getElementById("viewers").innerText = "OFFLINE";
            return;
        }

        /* VIDEO STATS */
        const videoRes = await fetch(
        `https://www.googleapis.com/youtube/v3/videos?part=statistics,liveStreamingDetails&id=${liveVideoId}&key=${API_KEY}`
        );

        const videoData = await videoRes.json();

        if(!videoData.items?.length){
            document.getElementById("likes").innerText = "0";
            document.getElementById("viewers").innerText = "0";
            return;
        }

        const v = videoData.items[0];

        document.getElementById("likes").innerText =
        formatNumber(v.statistics?.likeCount || 0);

        document.getElementById("viewers").innerText =
        formatNumber(v.liveStreamingDetails?.concurrentViewers || 0);

    }
    catch(err){
        console.log("ERROR:", err);
    }
}

/* RUN LOOP */
updateStats();
setInterval(updateStats, 12000);

</script>

</body>
</html>
