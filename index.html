<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CrickAnt Live Stats</title>

<style>
body{
    margin:0;
    background:transparent;
    font-family:Arial,Helvetica,sans-serif;
}

.livebar{
    display:inline-flex;
    align-items:center;
    gap:20px;

    background:rgba(0,0,0,0.80);
    color:#fff;

    padding:10px 16px;
    border-radius:12px;

    font-size:20px;
    font-weight:700;

    border:1px solid rgba(255,255,255,0.12);
}

.live{
    color:#ff3b30;
    animation:blink 1.3s infinite;
}

@keyframes blink{
    50%{opacity:0.4;}
}

.item{
    white-space:nowrap;
}

.value{
    margin-left:6px;
}

.subs{ color:#4ade80; }
.likes{ color:#fbbf24; }
.viewers{ color:#60a5fa; }
</style>
</head>

<body>

<div class="livebar">
<span class="live">🔴 LIVE</span>

<span class="item subs">
👥 <span id="subs">...</span>
</span>

<span class="item likes">
👍 <span id="likes">...</span>
</span>

<span class="item viewers">
👁️ <span id="viewers">...</span>
</span>
</div>

<script>

const API_KEY = "AIzaSyCemhZq445bjWz5WcvAm2TW7SJH--ZcKeM";

const CHANNEL_ID = "UCl2YvPVvilace6dpoaYWZYA";

/* FORMAT */
function formatNumber(num){
    return Number(num).toLocaleString();
}

/* 🔥 FIX 1: MORE RELIABLE LIVE DETECTION */
async function getLiveVideoId(){

    try{
        // FIX: order=date improves live detection accuracy
        const res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&order=date&key=${API_KEY}`
        );

        const data = await res.json();

        if(data.items && data.items.length > 0){
            return data.items[0].id.videoId;
        }

        return null;

    }catch(e){
        return null;
    }
}

/* MAIN */
async function updateStats(){

    try{

        /* CHANNEL STATS (SAFE ALWAYS) */
        const channelRes = await fetch(
        `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`
        );

        const channelData = await channelRes.json();

        if(channelData.items && channelData.items.length){
            document.getElementById("subs").innerText =
            formatNumber(channelData.items[0].statistics.subscriberCount);
        }

        /* LIVE VIDEO */
        const liveVideoId = await getLiveVideoId();

        if(!liveVideoId){
            document.getElementById("likes").innerText = "OFFLINE";
            document.getElementById("viewers").innerText = "OFFLINE";
            return;
        }

        /* 🔥 FIX 2: SAFE VIDEO API HANDLING */
        const videoRes = await fetch(
        `https://www.googleapis.com/youtube/v3/videos?part=statistics,liveStreamingDetails&id=${liveVideoId}&key=${API_KEY}`
        );

        const videoData = await videoRes.json();

        if(!videoData.items || videoData.items.length === 0){
            document.getElementById("likes").innerText = "0";
            document.getElementById("viewers").innerText = "0";
            return;
        }

        const v = videoData.items[0];

        document.getElementById("likes").innerText =
        formatNumber(v.statistics?.likeCount || 0);

        document.getElementById("viewers").innerText =
        formatNumber(v.liveStreamingDetails?.concurrentViewers || 0);

    }
    catch(err){
        console.log("API ERROR:", err);
    }
}

updateStats();
setInterval(updateStats, 12000);

</script>

</body>
</html>
