<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<title>CrickAnt Live Stats</title><style>
body{
    margin:0;
    background:transparent;
    font-family:Arial,Helvetica,sans-serif;
}

.livebar{
    display:inline-flex;
    align-items:center;
    gap:22px;

    background:linear-gradient(
        90deg,
        rgba(13,17,23,.96),
        rgba(22,27,34,.96)
    );

    color:#ffffff;

    padding:10px 18px;

    border-radius:12px;

    font-size:22px;

    font-weight:700;

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
        0 4px 12px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.08);
}

.live{
    color:#ff3b30;
    animation:pulse 1.5s infinite;
}

.item{
    white-space:nowrap;
}

.value{
    margin-left:4px;
    color:#ffffff;
}

.subs{
    color:#4ade80;
}

.likes{
    color:#fbbf24;
}

.viewers{
    color:#60a5fa;
}

@keyframes pulse{
    0%{opacity:1;}
    50%{opacity:.4;}
    100%{opacity:1;}
}
</style></head><body><div class="livebar"><span class="live">🔴 LIVE</span>

<span class="item subs">
👥 <span class="value" id="subs">...</span> Subs
</span><span class="item likes">
👍 <span class="value" id="likes">...</span> Likes
</span><span class="item viewers">
👁️ <span class="value" id="viewers">...</span> Watching
</span></div><script>

const API_KEY = "AIzaSyCemhZq445bjWz5WcvAm2TW7SJH--ZcKeM";

const CHANNEL_ID = "UCl2YvPVvilace6dpoaYWZYA";

function formatSubscribers(num){
    return Number(num).toLocaleString();
}

function formatCompact(num){

    num = Number(num);

    if(num >= 1000000){
        return (num/1000000).toFixed(1).replace(".0","")+"M";
    }

    if(num >= 1000){
        return (num/1000).toFixed(1).replace(".0","")+"K";
    }

    return num.toLocaleString();
}

async function getLiveVideoId(){

    const res = await fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
    );

    const data = await res.json();

    if(data.items && data.items.length > 0){
        return data.items[0].id.videoId;
    }

    return null;
}

async function updateStats(){

    try{

        const channelRes = await fetch(
            `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`
        );

        const channelData = await channelRes.json();

        document.getElementById("subs").innerText =
        formatSubscribers(channelData.items[0].statistics.subscriberCount);

        const liveVideoId = await getLiveVideoId();

        if(!liveVideoId){

            document.getElementById("likes").innerText = "OFFLINE";
            document.getElementById("viewers").innerText = "OFFLINE";

            return;
        }

        const videoRes = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=statistics,liveStreamingDetails&id=${liveVideoId}&key=${API_KEY}`
        );

        const videoData = await videoRes.json();

        if(!videoData.items || !videoData.items.length){
            return;
        }

        document.getElementById("likes").innerText =
        formatCompact(videoData.items[0].statistics.likeCount || 0);

        document.getElementById("viewers").innerText =
        formatCompact(videoData.items[0].liveStreamingDetails.concurrentViewers || 0);

    }
    catch(err){
        console.log(err);
    }
}

updateStats();
setInterval(updateStats,15000);

</script></body>
</html>
